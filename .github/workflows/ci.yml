name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=!storybook --filter=!docs --filter=!e2e --filter=!@guideflow/demo

      - name: Type check
        run: pnpm turbo run type-check --filter=!storybook --filter=!docs --filter=!e2e --filter=!@guideflow/demo

      - name: Lint
        run: pnpm turbo run lint --filter=!storybook --filter=!docs --filter=!e2e --filter=!@guideflow/demo

      - name: Test
        run: pnpm turbo run test --filter=!storybook --filter=!docs --filter=!e2e --filter=!@guideflow/demo
