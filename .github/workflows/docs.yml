name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'apps/docs/**'
      - 'packages/*/src/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='@guideflow/core' --filter='@guideflow/react' --filter='@guideflow/ai' --filter='@guideflow/analytics'

      - name: Build docs
        run: pnpm docs:build

      - name: Build demo
        run: pnpm --filter @guideflow/demo build

      - name: Copy demo into docs output
        run: cp -r apps/demo/dist apps/docs/.vitepress/dist/demo

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/docs/.vitepress/dist
          keep_files: false
